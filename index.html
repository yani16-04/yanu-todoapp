<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Poppins', sans-serif;
    }

    .login-box {
      background: rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      color: white;
    }

    input {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    window.location.href = "todo.html";
  } else {
    alert("Invalid login!");
  }
}
</script>

</body>
</html>
