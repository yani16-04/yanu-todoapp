<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      font-family: Arial;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    window.location.href = "todo.html";
  } else {
    alert("Invalid Login!");
  }
}
</script>

</body>
</html>
